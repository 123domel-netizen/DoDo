# Konfiguracja Supabase CLI.
# Najważniejsze: funkcje wywoływane bez sesji użytkownika (Auth Hook, cron)
# MUSZĄ mieć wyłączoną weryfikację JWT. Inaczej brama Edge odrzuca wywołanie
# z błędem typu „Hook requires authorization token", bo GoTrue / cron nie
# wysyłają tokenu JWT Supabase — uwierzytelniają się własnym sekretem
# (Standard Webhooks) albo nagłówkiem sprawdzanym w funkcji.

project_id = "kalendarz-todo"

# Site URL = produkcja (NIE zmieniać na preview).
# Preview musi być na additional_redirect_urls — już na remote; lokalna kopia
# dokumentuje wymagane wpisy (config push tylko gdy świadomie synchronizujemy auth).
[auth]
enabled = true
site_url = "https://dodo-c39.pages.dev"
additional_redirect_urls = [
  "https://dodo-c39.pages.dev",
  "https://dodo-c39.pages.dev/**",
  "http://localhost:5173",
  "http://localhost:5173/**",
  "http://localhost:5199",
  "http://localhost:5199/**",
  "http://127.0.0.1:5173",
  "http://127.0.0.1:5173/**",
]

# Auth Hook „before-user-created" (whitelista logowania).
# GoTrue podpisuje żądanie sekretem hooka (v1,whsec_...), nie tokenem JWT.
[functions.auth-allowlist]
verify_jwt = false

# Cron wysyłający przypomnienia push.
[functions.send-reminders]
verify_jwt = false

# Trigger pg_net po INSERT do messages (push czatu). Uwierzytelnianie:
# nagłówek x-chat-secret sprawdzany w funkcji (sekret CHAT_PUSH_SECRET).
[functions.notify-message]
verify_jwt = false

# Podgląd linków (OG scraping) — wywoływana z klienta z sesją użytkownika,
# więc weryfikacja JWT ZOSTAJE włączona.
[functions.link-preview]
verify_jwt = true
