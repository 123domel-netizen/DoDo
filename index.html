<!doctype html>
<html lang="pl" class="dark">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#100e16" />
    <link rel="apple-touch-icon" href="/icon-512.png" />
    <title>DoDo</title>
    <script>
      (function () {
        try {
          var pref = localStorage.getItem("dodo-theme-pref");
          var resolved = localStorage.getItem("dodo-theme");
          var theme = pref === "light" || pref === "dark" || pref === "system" ? pref : resolved === "light" ? "light" : "dark";
          var dark = theme === "system"
            ? window.matchMedia("(prefers-color-scheme: dark)").matches
            : theme === "dark";
          document.documentElement.classList.toggle("dark", dark);
          document.documentElement.dataset.theme = dark ? "dark" : "light";
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
